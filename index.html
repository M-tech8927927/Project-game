 <!DOCTYPE html>
<html>
<head>
  <title>Міні світ 555</title>
</head>
<body style="margin:0; overflow:hidden;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const tileSize = 50;
const cols = 20;
const rows = 15;

// карта (0-трава, 1-вода, 2-гори)
let map = [];
for (let y = 0; y < rows; y++) {
  let row = [];
  for (let x = 0; x < cols; x++) {
    let rand = Math.random();
    if (rand < 0.1) row.push(1);
    else if (rand < 0.2) row.push(2);
    else row.push(0);
  }
  map.push(row);
}

// герой
let player = { x: 5, y: 5 };

// управління
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") player.y--;
  if (e.key === "ArrowDown") player.y++;
  if (e.key === "ArrowLeft") player.x--;
  if (e.key === "ArrowRight") player.x++;

  // щоб не вийти за карту
  player.x = Math.max(0, Math.min(cols - 1, player.x));
  player.y = Math.max(0, Math.min(rows - 1, player.y));
});

// малювання
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {

      // різні біоми
      if (map[y][x] === 0) ctx.fillStyle = "green"; // трава
      if (map[y][x] === 1) ctx.fillStyle = "blue";  // вода
      if (map[y][x] === 2) ctx.fillStyle = "gray";  // гори

      ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
    }
  }

  // герой
  ctx.fillStyle = "red";
  ctx.fillRect(player.x * tileSize, player.y * tileSize, tileSize, tileSize);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
